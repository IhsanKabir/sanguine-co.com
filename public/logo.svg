<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360">
  <rect width="500" height="360" fill="#122030"/>

  <!-- wave mark -->
  <path d="M 55,158 C 145,158 178,88 250,88 C 322,88 355,158 445,158"
    stroke="#C8A86E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- echo wave -->
  <path d="M 80,176 C 162,176 192,114 250,114 C 308,114 338,176 420,176"
    stroke="#C8A86E" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.28"/>

  <!-- wordmark -->
