    letter-spacing="2">Saanguine</text>

  <!-- rule -->
  <line x1="110" y1="272" x2="390" y2="272" stroke="#C8A86E" stroke-width="0.6" opacity="0.4"/>

  <!-- sub-label -->
  <text x="250" y="298"
    font-family="monospace"
    font-size="9"
    fill="#C8A86E"
