name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR / branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npx tsc --noEmit --pretty false

      # `next lint` is deprecated (removed in Next 16); we run the ESLint CLI
      # directly against eslint.config.mjs. The baseline is clean, so lint
      # failures block the build, and --max-warnings 0 stops warning creep.
      - name: ESLint
        run: npx eslint . --max-warnings 0

  e2e-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # The runner has no Supabase credentials — specs tagged @db self-skip
      # (see e2e/helpers.ts) and every page degrades gracefully without the
      # database, so this tier checks the skeleton: rendering, OG cards,
      # robots/JSON-LD, and the audio-consent gate.
      - name: Run smoke suite
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
