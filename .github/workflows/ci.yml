name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR / branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npx tsc --noEmit --pretty false

      - name: ESLint
        run: npx next lint
        # Lint failures do not block the build today — Phase 5 cleanup will
        # tighten this. Surface the report regardless of exit status so PR
        # reviewers can see it.
        continue-on-error: true
