name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly journey run (03:00 Dhaka ≈ 21:00 UTC): catches drift that lands
  # between deploys — dependency rot, external endpoints, flaky journeys.
  schedule:
    - cron: "0 21 * * *"

# Cancel in-flight runs for the same PR / branch when a new commit lands.
# Scheduled runs get their own group so a nightly can neither cancel nor be
# cancelled by a push run on main.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'schedule' && 'nightly' || 'push' }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npx tsc --noEmit --pretty false

      # `next lint` is deprecated (removed in Next 16); we run the ESLint CLI
      # directly against eslint.config.mjs. The baseline is clean, so lint
      # failures block the build, and --max-warnings 0 stops warning creep.
      - name: ESLint
        run: npx eslint . --max-warnings 0

  e2e-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # The runner has no Supabase credentials. db.ts throws at module load
      # without a DATABASE_URL, so we provide a placeholder — postgres-js
      # connects lazily, so module init succeeds and queries fail at runtime
      # where the storefront's catch-paths degrade gracefully. E2E_SKIP_DB
      # makes the @db-tagged specs self-skip (see e2e/helpers.ts) since the
      # placeholder DB has no catalogue. This tier checks the skeleton:
      # rendering, OG cards, robots/JSON-LD, and the audio-consent gate.
      - name: Run smoke suite
        run: npx playwright test
        env:
          E2E_SKIP_DB: "1"
          DATABASE_URL: postgresql://placeholder:placeholder@127.0.0.1:5432/placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
